name: Deploy to GitHub Pages

# 於 adhd-platform 建置並部署到 GitHub Pages。
# 前提：在 repo Settings → Pages 選 "GitHub Actions" 作為來源。
# base path 於 vite.config.ts 由 NODE_ENV=production 決定為 /ADHD-Website/。
# 若此 repo 名稱不是 ADHD-Website，改 vite.config.ts 的 base 或設 VITE_BASE。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adhd-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: adhd-platform/package-lock.json
      - run: npm ci
      - run: npm run deploy
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: adhd-platform/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
